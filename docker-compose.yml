services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin via reverse proxy in front of both, OR set absolute URL here.
        VITE_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
